name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  COVERAGE_THRESHOLD: 70

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Linting
        run: npm run lint

      - name: Build the application
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.lifestack.app' }}

      - name: Enforce test coverage
        run: npm run test -- --coverage --coverage.reporter=text --coverage.reporter=lcov --coverage.thresholds.lines=${COVERAGE_THRESHOLD}
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.lifestack.app' }}
