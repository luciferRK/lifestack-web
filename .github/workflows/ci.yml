name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  COVERAGE_DEADLINE: 2026-07-01
  COVERAGE_THRESHOLD: 70

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Linting
        run: npm run lint

      - name: Build the application
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.lifestack.app' }}

      - name: Coverage policy (date-gated)
        run: |
          TODAY="$(date -u +%F)"
          HAS_TEST_SCRIPT="$(node -e "const p=require('./package.json'); process.stdout.write(p.scripts && p.scripts.test ? 'yes' : 'no')")"

          echo "Today (UTC): ${TODAY}"
          echo "Coverage deadline: ${COVERAGE_DEADLINE}"

          if [ "${HAS_TEST_SCRIPT}" = "yes" ]; then
            echo "Test script detected. Running tests with coverage."
            npm run test -- --coverage --coverageReporters=text --coverageReporters=lcov --coverageThreshold="{\"global\":{\"lines\":${COVERAGE_THRESHOLD}}}"
            exit 0
          fi

          if [ "${TODAY}" \< "${COVERAGE_DEADLINE}" ]; then
            echo "No test script yet. Allowed until ${COVERAGE_DEADLINE}."
            exit 0
          fi

          echo "Coverage enforcement active: add a test script and coverage setup (minimum ${COVERAGE_THRESHOLD}% lines)."
          exit 1
